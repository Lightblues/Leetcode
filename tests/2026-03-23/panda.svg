<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#E8F5E9"/>
  
  <!-- 熊猫身体 -->
  <ellipse cx="200" cy="200" rx="120" ry="180" fill="#000000"/>
  
  <!-- 腹部 -->
  <ellipse cx="200" cy="200" rx="100" ry="140" fill="#FFFFFF"/>
  
  <!-- 左耳朵 -->
  <ellipse cx="130" cy="100" rx="35" ry="45" fill="#000000"/>
  
  <!-- 右耳朵 -->
  <ellipse cx="270" cy="100" rx="35" ry="45" fill="#000000"/>
  
  <!-- 左眼 -->
  <ellipse cx="155" cy="160" rx="25" ry="20" fill="#000000"/>
  
  <!-- 右眼 -->
  <ellipse cx="245" cy="160" rx="25" ry="20" fill="#000000"/>
  
  <!-- 左眼珠 -->
  <ellipse cx="155" cy="155" rx="10" ry="8" fill="#FFFFFF"/>
  
  <!-- 右眼珠 -->
  <ellipse cx="245" cy="155" rx="10" ry="8" fill="#FFFFFF"/>
  
  <!-- 鼻子 -->
  <ellipse cx="200" cy="185" rx="15" ry="12" fill="#000000"/>
  
  <!-- 嘴巴 -->
  <path d="M180 195 Q200 210 220 195" fill="#000000" stroke="#000000" stroke-width="2" fill-rule="evenodd"/>
  
  <!-- 左手 -->
  <ellipse cx="100" cy="220" rx="35" ry="45" fill="#000000"/>
  
  <!-- 右手 -->
  <ellipse cx="300" cy="220" rx="35" ry="45" fill="#000000"/>
  
  <!-- 左脚 -->
  <ellipse cx="130" cy="320" rx="35" ry="45" fill="#000000"/>
  
  <!-- 右脚 -->
  <ellipse cx="270" cy="320" rx="35" ry="45" fill="#000000"/>
  
  <!-- 竹子 -->
  <g transform="translate(100, 180)" fill="#2E7D32">
    <rect x="0" y="0" width="20" height="80" rx="2"/>
    <rect x="-10" y="20" width="40" height="20" rx="2"/>
    <rect x="-15" y="45" width="50" height="15" rx="2"/>
    <rect x="-5" y="65" width="30" height="15" rx="2"/>
  </g>
  
  <!-- 竹叶 -->
  <g fill="#2E7D32">
    <path d="M110 180 Q100 160 90 180"/>
    <path d="M290 180 Q300 160 310 180"/>
  </g>
</svg>